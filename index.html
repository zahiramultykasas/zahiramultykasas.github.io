    <script>
        const GITHUB_USER = "zahiramultykasas"; // CAMBIA ESTO

        async function trackClick(platform) {
            // 1. Registro en Google Analytics 4 (Métrica con Fechas)
            if (typeof gtag === 'function') {
                gtag('event', 'click_social', {
                    'plataforma': platform
                });
            }

            try {
                // 2. Registro en CounterAPI (Odómetro Total)
                await fetch(`https://api.counterapi.dev/v1/${GITHUB_USER}/${platform}/up`, {
                    keepalive: true,
                    mode: 'no-cors'
                });
            } catch (error) {
                // Falla silenciosa: si hay AdBlock, la página sigue funcionando perfecto
            }
        }

        // Debounce para evitar clics accidentales múltiples
        function debounce(func, wait) {
            let timeout;
            return function (...args) {
                clearTimeout(timeout);
                timeout = setTimeout(() => func.apply(this, args), wait);
            };
        }

        document.querySelectorAll('.social-link, .cta-button').forEach(el => {
            el.addEventListener('click', debounce((e) => {
                // Usamos 'el' en lugar de 'e.currentTarget' porque el evento expira tras el timeout
                const platform = el.classList.contains('cta-button')
                    ? 'catalogo'
                    : el.className.split(' ')[1];

                trackClick(platform);
            }, 300));
        });
    </script>
