<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Dashboard de Métricas | Lumark</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 800px;
            margin-top: 30px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .stat-number {
            font-size: 2rem;
            font-weight: bold;
            color: #25d366;
        }

        /* Contenedor responsivo para Looker Studio */
        .looker-wrapper {
            width: 100%;
            max-width: 800px;
            margin-top: 40px;
            border-radius: 15px;
            overflow-x: auto;
            /* Permite deslizar a los lados en móvil */
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            -webkit-overflow-scrolling: touch;
            /* Deslizamiento fluido en iOS */
        }

        .looker-iframe {
            width: 100%;
            min-width: 700px;
            /* Obliga al panel a mantener su ancho original para no achicar las gráficas */
            height: 480px;
            border: 0;
            display: block;
        }
    </style>
</head>

<body>
    <main class="main-container" style="flex-direction: column;">
        <h1>Métricas de Clics</h1>
        <div class="stats-grid" id="stats-container">
            <div class="stat-card">
                <h3>Catálogo</h3>
                <p class="stat-number" id="count-catalogo">...</p>
            </div>
            <div class="stat-card">
                <h3>WhatsApp</h3>
                <p class="stat-number" id="count-whatsapp">...</p>
            </div>
            <div class="stat-card">
                <h3>Facebook</h3>
                <p class="stat-number" id="count-facebook">...</p>
            </div>
        </div>

        <!-- Panel de Looker Studio Integrado -->
        <div class="looker-wrapper">
            <iframe class="looker-iframe"
                src="https://datastudio.google.com/embed/reporting/adf31276-c862-4f30-b4f6-ef52efe83cd8/page/kIV1C"
                allowfullscreen
                sandbox="allow-storage-access-by-user-activation allow-scripts allow-same-origin allow-popups allow-popups-to-escape-sandbox"></iframe>
        </div>

        <p style="margin-top: 20px; opacity: 0.6;">Los datos se actualizan automáticamente.</p>
    </main>

    <script>
        const GITHUB_USER = "zahiramultykasas"; // DEBE SER EL MISMO DE INDEX
        const platforms = ['catalogo', 'whatsapp', 'facebook'];

        async function updateStats() {
            // REGLA DE MENTOR: No pedir datos si la pestaña no se está viendo
            if (document.hidden) return;

            for (const p of platforms) {
                try {
                    const res = await fetch(`https://api.counterapi.dev/v1/${GITHUB_USER}/${p}/`);
                    const data = await res.json();
                    const el = document.getElementById(`count-${p}`);
                    if (el) el.innerText = data.count || 0;
                } catch (e) {
                    console.log(`Error al pedir datos de ${p}:`, e);
                    const el = document.getElementById(`count-${p}`);
                    if (el && el.innerText === "...") el.innerText = "Error/Bloqueado";
                }
            }
        }

        // Actualizar cada 5 segundos
        const interval = setInterval(updateStats, 5000);
        updateStats();

        // Limpiar recursos si se cierra
        document.addEventListener("visibilitychange", () => {
            if (document.hidden) console.log("Ahorrando batería: pausa de métricas.");
        });
    </script>
</body>

</html>
